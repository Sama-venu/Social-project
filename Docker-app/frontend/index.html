<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Login/Register Forms -->
        <div id="authSection" class="auth-section">
            <div class="form-container">
                <h2>Instagram Clone</h2>
                
                <div class="form-tabs">
                    <button class="tab-btn active" onclick="showForm('login')">Login</button>
                    <button class="tab-btn" onclick="showForm('register')">Register</button>
                </div>
                
                <!-- Login Form -->
                <form id="loginForm" class="form active">
                    <input type="text" id="loginUsername" placeholder="Username or Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Login</button>
                    <div id="loginError" class="error-message"></div>
                </form>
                
                <!-- Register Form -->
                <form id="registerForm" class="form">
                    <input type="text" id="regFullname" placeholder="Full Name" required>
                    <input type="text" id="regUsername" placeholder="Username" required>
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <input type="password" id="regPassword" placeholder="Password" required>
                    <button type="submit">Register</button>
                    <div id="regError" class="error-message"></div>
                </form>
            </div>
        </div>
        
        <!-- Main App Section (after login) -->
        <div id="appSection" style="display: none;">
            <div class="navbar">
                <h1>Instagram Clone</h1>
                <div>
                    <span id="userName"></span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </div>
            
            <div class="feed-container">
                <div class="create-post">
                    <h3>Create New Post</h3>
                    <input type="text" id="postImageUrl" placeholder="Image URL" required>
                    <textarea id="postCaption" placeholder="Write a caption..."></textarea>
                    <button onclick="createPost()">Share Post</button>
                </div>
                
                <div id="postsFeed" class="posts-feed">
                    <!-- Posts will be loaded here -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
